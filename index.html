<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="oAtom_ - Minecraft Thumbnail Designer">
    
    <title>oAtom_ | Minecraft Thumbnails</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for bulletproof icons (prevents SVG parsing errors on mobile) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for compiling JSX -->
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

    <!-- Custom Styles -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }
        h1, h2, h3, h4, h5, h6 { font-family: 'Poppins', sans-serif; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #FF2D2D; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff4545; }
        
        /* Selection */
        ::selection { background-color: #FF2D2D; color: #ffffff; }
        ::-moz-selection { background-color: #FF2D2D; color: #ffffff; }

        /* Hide scrollbar for nav */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <!-- Fallback UI -->
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height: 100vh; color: white; flex-direction: column; background: black; text-align: center; padding: 20px;">
            <h2 style="margin-bottom: 10px; color: #FF2D2D; font-family: sans-serif;">Loading Portfolio...</h2>
            <p style="color: #888; font-family: sans-serif;">Please wait a moment while the scripts load.</p>
            <div id="debug-log" style="color: #ffaaaa; margin-top: 20px; font-size: 12px; font-family: monospace;"></div>
        </div>
    </div>

    <script>
        window.addEventListener('error', function(e) {
            const log = document.getElementById('debug-log');
            if (log) { log.innerHTML += 'Error: ' + e.message + '<br>'; }
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SAFE STORAGE HELPERS ---
        const safeStorage = {
            get: (key) => {
                try { return localStorage.getItem(key); } 
                catch (e) { return null; }
            },
            set: (key, value) => {
                try { localStorage.setItem(key, value); } 
                catch (e) { console.warn("Local storage blocked."); }
            }
        };

        // --- UTILITY FUNCTIONS ---
        const extractHandle = (url) => {
            const match = url.match(/@([a-zA-Z0-9_.-]+)/);
            return match ? "@" + match[1] : null;
        };

        const formatSubs = (countStr) => {
            const count = parseInt(countStr, 10);
            if (isNaN(count)) return countStr;
            if (count >= 1000000) return (count / 1000000).toFixed(2).replace(/\.00$/, '') + 'M';
            if (count >= 1000) return (count / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
            return count.toString();
        };

        const fetchYouTubeData = async (handle) => {
            try {
                const cleanHandle = handle.replace('@', '');
                const url = "https://yt.lemnoslife.com/channels?handle=@" + cleanHandle + "&part=snippet,statistics";
                const res = await fetch(url);
                const data = await res.json();
                
                if (data && data.items && data.items.length > 0) {
                    const channel = data.items[0];
                    return {
                        name: channel.snippet.title,
                        subs: formatSubs(channel.statistics.subscriberCount),
                        image: "https://unavatar.io/youtube/" + cleanHandle, 
                        handle: "@" + cleanHandle
                    };
                }
                return null;
            } catch (error) {
                console.error("Failed to fetch YT data:", error);
                return null;
            }
        };

        // --- DEFAULT DATA ---
        const defaultClients = [
            { id: 1, name: "LivingLegend", subs: "94.2K", image: "https://unavatar.io/youtube/LivingLegendOP", handle: "@LivingLegendOP" },
            { id: 2, name: "ItzNectar", subs: "21.5K", image: "https://unavatar.io/youtube/itznectar", handle: "@itznectar" },
            { id: 3, name: "MominGaming", subs: "13.8K", image: "https://unavatar.io/youtube/Momingaming50", handle: "@Momingaming50" }
        ];

        const defaultPortfolio = [
            { id: 1, title: "I Became Minecraft's Serial Killer", desc: "Built for high CTR and shock value", img: "https://customer-assets.emergentagent.com/job_e2a39607-2a2e-435e-accd-e6cb36a1d21f/artifacts/pcjm2n81_Final%20bos%20ka%20bhi%20final%20boss.png" },
            { id: 2, title: "Why My Friends Betrayed Me (Minecraft SMP)", desc: "Emotion-driven design for more clicks", img: "https://customer-assets.emergentagent.com/job_e2a39607-2a2e-435e-accd-e6cb36a1d21f/artifacts/mquvrng2_edit1.png" },
            { id: 3, title: "Minecraft PvP Montage (HT3)", desc: "Clean action-focused thumbnail", img: "https://customer-assets.emergentagent.com/job_e2a39607-2a2e-435e-accd-e6cb36a1d21f/artifacts/zxf6ha9a_thumb%202.jpg" },
            { id: 4, title: "Minecraft... But It's Terrifying", desc: "Horror-style curiosity design", img: "https://customer-assets.emergentagent.com/job_thumbnail-atom/artifacts/2apz66ww_ahhh%20kitna%20kaam%20kru%20%F0%9F%98%AD.png" },
            { id: 5, title: "I Joined Minecraft's Greatest Supervillains", desc: "High contrast storytelling", img: "https://customer-assets.emergentagent.com/job_e2a39607-2a2e-435e-accd-e6cb36a1d21f/artifacts/qj687wto_thumb4.jpg" },
            { id: 6, title: "Why I Assassinated Everyone in This SMP", desc: "Drama-focused clickbait design", img: "https://customer-assets.emergentagent.com/job_e2a39607-2a2e-435e-accd-e6cb36a1d21f/artifacts/8iu1odtz_thumb3.png" },
            { id: 7, title: "I Became Minecraft's Greatest Spy", desc: "Mystery-based thumbnail", img: "https://customer-assets.emergentagent.com/job_thumbnail-atom/artifacts/f9bydvnq_1000051194.png" }
        ];

        // --- MAIN APP ---
        function App() {
            const [view, setView] = useState('home'); 
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);

            const [portfolio, setPortfolio] = useState(() => {
                const saved = safeStorage.get('atom_portfolio');
                return saved ? JSON.parse(saved) : defaultPortfolio;
            });
            const [clients, setClients] = useState(() => {
                const saved = safeStorage.get('atom_clients');
                return saved ? JSON.parse(saved) : defaultClients;
            });
            const [totalSubs, setTotalSubs] = useState(() => {
                const saved = safeStorage.get('atom_totalsubs');
                return saved ? saved : "130K";
            });

            useEffect(() => { safeStorage.set('atom_portfolio', JSON.stringify(portfolio)); }, [portfolio]);
            useEffect(() => { safeStorage.set('atom_clients', JSON.stringify(clients)); }, [clients]);
            useEffect(() => { safeStorage.set('atom_totalsubs', totalSubs); }, [totalSubs]);

            useEffect(() => {
                const syncClients = async () => {
                    setIsSyncing(true);
                    const updatedClients = await Promise.all(
                        clients.map(async (client) => {
                            if (client.handle) {
                                const liveData = await fetchYouTubeData(client.handle);
                                if (liveData) return { ...client, ...liveData };
                            }
                            return client;
                        })
                    );
                    setClients(updatedClients);
                    setIsSyncing(false);
                };
                syncClients();
            }, []); 

            return (
                <div className="min-h-screen bg-black text-white font-sans selection:bg-[#FF2D2D] selection:text-white overflow-x-hidden relative">
                    {view !== 'admin' && <Navbar setView={setView} currentView={view} />}
                    {view === 'home' && <HomePage portfolio={portfolio} clients={clients} totalSubs={totalSubs} setView={setView} />}
                    {view === 'artworks' && <AllArtworksPage portfolio={portfolio} setView={setView} />}
                    {view === 'admin' && !isAuthenticated && <AdminLogin onLogin={() => setIsAuthenticated(true)} setView={setView} />}
                    {view === 'admin' && isAuthenticated && (
                        <AdminDashboard 
                            portfolio={portfolio} setPortfolio={setPortfolio}
                            clients={clients} setClients={setClients}
                            totalSubs={totalSubs} setTotalSubs={setTotalSubs}
                            setView={setView} setIsAuthenticated={setIsAuthenticated}
                            isSyncing={isSyncing}
                        />
                    )}
                </div>
            );
        }

        function Navbar({ setView, currentView }) {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const handleNav = (targetView, anchor) => {
                setIsMobileMenuOpen(false);
                if (currentView !== 'home' && targetView === 'home') {
                    setView('home');
                    setTimeout(() => { 
                        if (anchor) document.getElementById(anchor)?.scrollIntoView({ behavior: 'smooth' }); 
                    }, 100);
                } else {
                    if (anchor) {
                        document.getElementById(anchor)?.scrollIntoView({ behavior: 'smooth' });
                    } else { 
                        setView(targetView); 
                        window.scrollTo(0, 0); 
                    }
                }
            };

            return (
                <React.Fragment>
                    <header className="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/10">
                        <div className="container mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                            <h1 onClick={() => handleNav('home')} className="text-2xl font-bold tracking-tight cursor-pointer hover:text-[#FF2D2D] transition-colors">
                                oAtom_
                            </h1>
                            <button onClick={() => setIsMobileMenuOpen(true)} className="text-white hover:text-[#FF2D2D] transition-colors cursor-pointer p-2 -mr-2 text-2xl">
                                <i className="fa-solid fa-bars"></i>
                            </button>
                        </div>
                    </header>

                    <div className={`fixed inset-0 z-[60] bg-black/95 flex flex-col items-center justify-center space-y-8 text-2xl font-bold backdrop-blur-lg transition-all duration-300 ${isMobileMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible pointer-events-none'}`}>
                        <button onClick={() => setIsMobileMenuOpen(false)} className="absolute top-4 right-4 sm:top-6 sm:right-6 text-white hover:text-[#FF2D2D] p-4 text-3xl">
                            <i className="fa-solid fa-xmark"></i>
                        </button>
                        <button onClick={() => handleNav('home', 'portfolio')} className="hover:text-[#FF2D2D] transition-colors">Portfolio</button>
                        <button onClick={() => handleNav('artworks')} className="hover:text-[#FF2D2D] transition-colors">All Artworks</button>
                        <button onClick={() => handleNav('home', 'contact')} className="hover:text-[#FF2D2D] transition-colors">Contact</button>
                    </div>
                </React.Fragment>
            );
        }

        function HomePage({ portfolio, clients, totalSubs, setView }) {
            const featuredPortfolio = portfolio.slice(0, 4);

            return (
                <div className="animate-in fade-in duration-500">
                    <section className="min-h-screen flex items-center justify-center px-4 sm:px-6 pt-20">
                        <div className="container mx-auto max-w-5xl text-center">
                            <div className="space-y-6 sm:space-y-8 duration-700">
                                <h2 className="text-4xl sm:text-5xl md:text-7xl font-bold leading-tight">
                                    I Make Minecraft Thumbnails That Get <br className="hidden md:block" />
                                    <span className="text-[#FF2D2D] relative inline-block">
                                        Clicks
                                        <div className="absolute -inset-2 bg-[#FF2D2D]/20 blur-xl -z-10 rounded-full"></div>
                                    </span>
                                </h2>
                                <p className="text-xl sm:text-2xl md:text-3xl text-white/90 font-medium">More views. More clicks. More growth.</p>
                                <p className="text-base sm:text-lg md:text-xl text-white/70 max-w-3xl mx-auto leading-relaxed">
                                    I&apos;m Atom — a Minecraft thumbnail designer focused on high-CTR visuals that stop scrolling and drive views.
                                </p>
                                <div className="pt-4 sm:pt-6">
                                    <p className="text-lg sm:text-xl md:text-2xl font-semibold text-white/90 mb-6 flex flex-col sm:block gap-1">
                                        <span>Pricing: <span className="text-[#FF2D2D]">$3 – $53</span></span> 
                                        <span className="text-white/50 text-sm sm:text-base font-normal sm:ml-2">(DM for custom packages)</span>
                                    </p>
                                    <button onClick={() => document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' })} className="inline-flex items-center justify-center gap-3 shadow h-12 md:h-14 rounded-md bg-[#FF2D2D] hover:bg-[#FF2D2D]/90 text-white px-6 sm:px-8 py-4 sm:py-6 text-base sm:text-lg font-bold group transition-all hover:scale-105 hover:shadow-[0_0_30px_rgba(255,45,45,0.4)]">
                                        Let&apos;s Work Together
                                        <i className="fa-solid fa-arrow-up-right-from-square group-hover:translate-x-1 transition-transform"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="py-16 sm:py-20 bg-[#0a0a0a] border-y border-white/5 relative overflow-hidden">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] sm:w-[600px] h-[300px] bg-[#FF2D2D]/5 blur-[100px] rounded-full pointer-events-none"></div>
                        <div className="container mx-auto px-4 sm:px-6 relative z-10 text-center">
                            <h3 className="text-xl sm:text-2xl md:text-3xl font-bold mb-2 text-white/80">Trusted By Creators With</h3>
                            <p className="text-5xl sm:text-6xl md:text-7xl font-extrabold text-[#FF2D2D] mb-10 sm:mb-12 drop-shadow-[0_0_30px_rgba(255,45,45,0.3)] tracking-tight">
                                {totalSubs}+ <span className="text-2xl sm:text-3xl md:text-5xl text-white">Subscribers</span>
                            </p>
                            
                            <div className="flex flex-wrap justify-center gap-6 sm:gap-10 md:gap-16 items-center">
                                {clients.map(client => (
                                    <div key={client.id} className="flex flex-col items-center gap-3 sm:gap-4 group">
                                        <div className="w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 rounded-full overflow-hidden border-2 border-white/10 group-hover:border-[#FF2D2D]/50 transition-colors duration-300 shadow-lg bg-[#111]">
                                            <img src={client.image} alt={client.name} referrerPolicy="no-referrer" onError={(e) => { e.target.onerror = null; e.target.src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(client.name) + "&background=111&color=fff&size=128"; }} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="text-center">
                                            <p className="font-bold text-base sm:text-lg md:text-xl text-white group-hover:text-[#FF2D2D] transition-colors">{client.name}</p>
                                            <p className="text-xs sm:text-sm md:text-base text-[#FF2D2D] font-medium">{client.subs} Subs</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <p className="mt-10 sm:mt-12 text-white/40 italic text-base sm:text-lg font-medium">...and many more</p>
                        </div>
                    </section>

                    <section className="py-16 sm:py-24 px-4 sm:px-6" id="portfolio">
                        <div className="container mx-auto max-w-6xl">
                            <div className="text-center mb-12 sm:mb-16">
                                <h3 className="text-3xl sm:text-4xl md:text-5xl font-bold mb-4">Thumbnails That Get Clicks</h3>
                                <div className="w-16 sm:w-24 h-1 bg-[#FF2D2D] mx-auto"></div>
                            </div>
                            
                            <div className="space-y-16 sm:space-y-24">
                                {featuredPortfolio.map((item, index) => {
                                    const layoutClass = index % 2 !== 0 ? "md:flex-row-reverse" : "md:flex-row";
                                    return (
                                        <div key={item.id} className={"flex flex-col gap-6 sm:gap-8 items-center group " + layoutClass}>
                                            <div className="w-full md:w-1/2 overflow-hidden rounded-xl border border-white/5 bg-white/5">
                                                <img alt={item.title} src={item.img} className="w-full h-auto rounded-xl transition-all duration-700 group-hover:scale-[1.03] group-hover:shadow-[0_0_40px_rgba(255,45,45,0.3)]" />
                                            </div>
                                            <div className="w-full md:w-1/2 space-y-3 sm:space-y-4 px-2 sm:px-4 text-center md:text-left">
                                                <h4 className="text-2xl sm:text-3xl md:text-4xl font-bold text-white group-hover:text-[#FF2D2D] transition-colors leading-tight">{item.title}</h4>
                                                <p className="text-base sm:text-lg md:text-xl text-white/60 leading-relaxed">{item.desc}</p>
                                            </div>
                                        </div>
                                    );
                                })}

                                <div className="mt-16 sm:mt-20 pt-6 sm:pt-10 flex justify-center w-full">
                                    <button onClick={() => { setView('artworks'); window.scrollTo(0, 0); }} className="inline-flex items-center justify-center gap-3 shadow h-12 sm:h-14 rounded-md border-2 border-[#FF2D2D] text-[#FF2D2D] hover:bg-[#FF2D2D] hover:text-white px-8 sm:px-10 py-4 sm:py-6 text-base sm:text-lg font-bold transition-all hover:scale-105 hover:shadow-[0_0_30px_rgba(255,45,45,0.4)]">
                                        View All Artworks
                                        <i className="fa-solid fa-arrow-right"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>
                    <ContactSection />
                    <Footer setView={setView} />
                </div>
            );
        }

        function AllArtworksPage({ portfolio, setView }) {
            return (
                <div className="min-h-screen pt-20 sm:pt-24 pb-16 sm:pb-20 px-4 sm:px-6 animate-in fade-in duration-500 bg-[#050505]">
                    <div className="container mx-auto max-w-7xl">
                        <button onClick={() => { setView('home'); window.scrollTo(0, 0); }} className="flex items-center gap-2 text-white/50 hover:text-white mb-8 sm:mb-10 transition-colors font-medium p-2 -ml-2">
                            <i className="fa-solid fa-arrow-left"></i> Back to Home
                        </button>
                        
                        <div className="mb-10 sm:mb-16">
                            <h2 className="text-3xl sm:text-4xl md:text-6xl font-bold mb-4 sm:mb-6">Complete <span className="text-[#FF2D2D]">Gallery</span></h2>
                            <div className="w-16 sm:w-24 h-1 bg-[#FF2D2D]"></div>
                        </div>
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8">
                            {portfolio.map(item => (
                                <div key={item.id} className="group cursor-pointer flex flex-col">
                                    <div className="overflow-hidden rounded-xl border border-white/10 bg-white/5 mb-4 sm:mb-5 flex-grow">
                                        <img src={item.img} alt={item.title} className="w-full h-full object-cover rounded-xl transition-transform duration-700 group-hover:scale-105" />
                                    </div>
                                    <h4 className="text-lg sm:text-xl font-bold text-white group-hover:text-[#FF2D2D] transition-colors leading-snug">{item.title}</h4>
                                    <p className="text-sm sm:text-base text-white/50 mt-1 sm:mt-2">{item.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                    <Footer setView={setView} />
                </div>
            );
        }

        function ContactSection() {
            const [toastVisible, setToastVisible] = useState(false);
            const copyDiscord = () => {
                const el = document.createElement('textarea');
                el.value = 'atomhuladle_';
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setToastVisible(true);
                setTimeout(() => setToastVisible(false), 3000);
            };

            const toastClass = "fixed bottom-4 sm:bottom-6 right-4 sm:right-6 bg-[#252525] border border-white/10 text-white px-4 sm:px-6 py-3 sm:py-4 rounded-xl shadow-2xl flex items-center gap-3 transform transition-all duration-300 z-50 text-sm sm:text-base " + (toastVisible ? "translate-y-0 opacity-100" : "translate-y-20 opacity-0 pointer-events-none");

            return (
                <React.Fragment>
                    <section className="py-16 sm:py-24 px-4 sm:px-6 bg-white/5 border-t border-white/5" id="contact">
                        <div className="container mx-auto max-w-3xl">
                            <div className="text-center space-y-6 sm:space-y-8 bg-black/50 p-6 sm:p-12 rounded-2xl sm:rounded-3xl border border-white/10">
                                <h3 className="text-3xl sm:text-4xl md:text-5xl font-bold">Ready to boost your CTR?</h3>
                                <p className="text-lg sm:text-xl text-white/70">Let&apos;s discuss your next viral video thumbnail.</p>
                                <div className="pt-2 sm:pt-4 flex flex-col items-center justify-center gap-4">
                                    <button onClick={copyDiscord} className="inline-flex items-center justify-center gap-3 shadow h-12 sm:h-14 rounded-md bg-[#FF2D2D] hover:bg-[#FF2D2D]/90 text-white px-6 sm:px-8 text-base sm:text-lg font-bold transition-all hover:scale-105 hover:shadow-[0_0_30px_rgba(255,45,45,0.4)] w-full sm:w-auto">
                                        <i className="fa-regular fa-copy"></i> Copy Discord Username
                                    </button>
                                </div>
                                <p className="text-white/50 font-mono text-base sm:text-lg pt-1 sm:pt-2">atomhuladle_</p>
                            </div>
                        </div>
                    </section>

                    <div className={toastClass}>
                        <div className="bg-green-500/20 text-green-400 p-1 sm:p-1.5 rounded-full"><i className="fa-solid fa-check"></i></div>
                        <span className="font-medium">Discord username copied!</span>
                    </div>
                </React.Fragment>
            );
        }

        function Footer({ setView }) {
            return (
                <footer className="py-8 px-4 sm:px-6 border-t border-white/10 bg-black">
                    <div className="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-white/40 text-xs sm:text-sm">
                        <p className="text-center md:text-left">&copy; 2026 oAtom_. Making thumbnails that get clicks.</p>
                        <button onClick={() => { setView('admin'); window.scrollTo(0,0); }} className="hover:text-white transition-colors flex items-center gap-2 p-2">
                            <i className="fa-solid fa-gear"></i> Admin Panel
                        </button>
                    </div>
                </footer>
            );
        }

        function AdminLogin({ onLogin, setView }) {
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");

            const handleLogin = (e) => {
                e.preventDefault();
                if (email.trim().toLowerCase() === "anshladhe40@gmail.com" && password === "Ansh#@1234") {
                    onLogin(); setError("");
                } else { setError("Access Denied. Invalid email or password."); }
            };

            return (
                <div className="min-h-screen bg-[#050505] flex items-center justify-center p-4 sm:p-6 animate-in fade-in">
                    <div className="w-full max-w-md bg-black border border-white/10 rounded-2xl p-6 sm:p-8 shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[200px] h-[100px] bg-[#FF2D2D]/20 blur-[60px] pointer-events-none"></div>
                        <button onClick={() => setView('home')} className="absolute top-4 left-4 sm:top-6 sm:left-6 text-white/50 hover:text-white transition-colors p-2 text-xl">
                            <i className="fa-solid fa-arrow-left"></i>
                        </button>
                        <h2 className="text-2xl sm:text-3xl font-bold text-center mt-8 sm:mt-6 mb-2">Admin Access</h2>
                        <p className="text-white/50 text-center mb-8 text-sm sm:text-base">Authorized personnel only.</p>
                        {error && <div className="bg-red-500/10 border border-red-500/50 text-red-500 p-3 rounded-lg mb-6 text-sm text-center">{error}</div>}
                        <form onSubmit={handleLogin} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-white/70 mb-1">Email</label>
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF2D2D]" placeholder="admin@example.com" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-white/70 mb-1">Password</label>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF2D2D]" placeholder="••••••••" />
                            </div>
                            <button type="submit" className="w-full bg-[#FF2D2D] hover:bg-[#FF2D2D]/90 text-white font-bold py-3 rounded-lg mt-4 transition-colors">Login to Dashboard</button>
                        </form>
                    </div>
                </div>
            );
        }

        function AdminDashboard({ portfolio, setPortfolio, clients, setClients, totalSubs, setTotalSubs, setView, setIsAuthenticated, isSyncing }) {
            const [activeTab, setActiveTab] = useState('portfolio');
            const [newPortItem, setNewPortItem] = useState({ title: '', desc: '', img: '' });
            const [ytUrl, setYtUrl] = useState('');
            const [isFetchingYt, setIsFetchingYt] = useState(false);
            
            const [editingId, setEditingId] = useState(null);
            const [editItemData, setEditItemData] = useState({ title: '', desc: '', img: '' });

            const movePortfolioItem = (index, direction) => {
                const newItems = [...portfolio];
                if (direction === 'up' && index > 0) {
                    [newItems[index - 1], newItems[index]] = [newItems[index], newItems[index - 1]];
                } else if (direction === 'down' && index < newItems.length - 1) {
                    [newItems[index + 1], newItems[index]] = [newItems[index], newItems[index + 1]];
                }
                setPortfolio(newItems);
            };

            const addPortfolio = (e) => {
                e.preventDefault();
                if(!newPortItem.title || !newPortItem.img) return;
                setPortfolio([{ ...newPortItem, id: Date.now() }, ...portfolio]);
                setNewPortItem({ title: '', desc: '', img: '' });
            };

            const handleAddYouTubeClient = async (e) => {
                e.preventDefault();
                if(!ytUrl) return;
                setIsFetchingYt(true);
                const handle = extractHandle(ytUrl);
                if (!handle) { alert("Invalid YouTube URL. Please use: https://youtube.com/@username"); setIsFetchingYt(false); return; }
                const ytData = await fetchYouTubeData(handle);
                if (ytData) { setClients([...clients, { ...ytData, id: Date.now() }]); setYtUrl(''); } 
                else { alert("Failed to fetch YouTube data. Ensure the handle exists and is public."); }
                setIsFetchingYt(false);
            };

            const startEdit = (item) => {
                setEditingId(item.id);
                setEditItemData({ ...item });
            };

            const saveEdit = (id) => {
                if(!editItemData.title || !editItemData.img) return;
                setPortfolio(portfolio.map(p => p.id === id ? { ...p, ...editItemData } : p));
                setEditingId(null);
            };

            const tabClass = (tabName) => {
                return "flex items-center gap-2 sm:gap-3 px-3 sm:px-4 py-2 sm:py-3 rounded-lg text-left transition-colors whitespace-nowrap text-sm sm:text-base flex-shrink-0 " + 
                       (activeTab === tabName ? "bg-[#FF2D2D]/10 text-[#FF2D2D] font-medium" : "text-white/60 hover:bg-white/5 hover:text-white");
            };

            return (
                <div className="min-h-screen bg-[#0a0a0a] flex flex-col md:flex-row pb-10 md:pb-0">
                    <aside className="w-full md:w-64 md:h-screen md:sticky md:top-0 bg-black border-b md:border-b-0 md:border-r border-white/10 p-4 sm:p-6 flex flex-col z-20">
                        <div className="flex items-center justify-between md:block mb-6 md:mb-8">
                            <h2 className="text-xl sm:text-2xl font-bold text-white flex items-center gap-2">
                                <i className="fa-solid fa-table-columns text-[#FF2D2D]"></i> CMS
                            </h2>
                            <div className="flex flex-row md:flex-col gap-2 sm:gap-3 md:mt-8">
                                <button onClick={() => setView('home')} className="flex items-center gap-1 sm:gap-2 text-white/50 hover:text-white transition-colors text-sm sm:text-base p-2 md:p-0">
                                    <i className="fa-solid fa-arrow-left"></i> <span className="hidden sm:inline">Back to Site</span>
                                </button>
                                <button onClick={() => { setIsAuthenticated(false); setView('home'); }} className="flex items-center gap-1 sm:gap-2 text-red-500/50 hover:text-red-500 transition-colors text-sm sm:text-base p-2 md:p-0">
                                    <i className="fa-solid fa-xmark"></i> <span className="hidden sm:inline">Logout</span>
                                </button>
                            </div>
                        </div>
                        <nav className="flex md:flex-col gap-2 overflow-x-auto pb-2 md:pb-0 hide-scrollbar flex-shrink-0">
                            <button onClick={() => setActiveTab('portfolio')} className={tabClass('portfolio')}><i className="fa-solid fa-image"></i> Manage Artworks</button>
                            <button onClick={() => setActiveTab('clients')} className={tabClass('clients')}><i className="fa-solid fa-users"></i> Manage Clients</button>
                            <button onClick={() => setActiveTab('stats')} className={tabClass('stats')}><i className="fa-solid fa-gear"></i> Site Settings</button>
                        </nav>
                    </aside>

                    <main className="flex-1 p-4 sm:p-6 md:p-12 overflow-y-auto">
                        <div className="max-w-4xl mx-auto">
                            {activeTab === 'portfolio' && (
                                <div className="animate-in fade-in">
                                    <h3 className="text-2xl sm:text-3xl font-bold mb-6 sm:mb-8">Manage Artworks</h3>
                                    
                                    <form onSubmit={addPortfolio} className="bg-black border border-white/10 rounded-xl p-4 sm:p-6 mb-8 sm:mb-10 space-y-4 shadow-xl">
                                        <h4 className="font-semibold text-base sm:text-lg flex items-center gap-2 mb-2"><i className="fa-solid fa-plus text-[#FF2D2D]"></i> Add New Artwork</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">
                                            <input type="text" placeholder="Title" value={newPortItem.title} onChange={e => setNewPortItem({...newPortItem, title: e.target.value})} className="bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF2D2D] text-sm sm:text-base" required />
                                            <input type="text" placeholder="Description" value={newPortItem.desc} onChange={e => setNewPortItem({...newPortItem, desc: e.target.value})} className="bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF2D2D] text-sm sm:text-base" required />
                                            <input type="url" placeholder="Image URL" value={newPortItem.img} onChange={e => setNewPortItem({...newPortItem, img: e.target.value})} className="md:col-span-2 bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF2D2D] text-sm sm:text-base" required />
                                        </div>
                                        <button type="submit" className="w-full sm:w-auto bg-[#FF2D2D] text-white px-6 py-3 rounded-lg font-medium hover:bg-[#FF2D2D]/90 transition-colors">Add to Portfolio</button>
                                    </form>

                                    <div className="space-y-4">
                                        {portfolio.map((item, index) => (
                                            editingId === item.id ? (
                                                <div key={item.id} className="bg-black border border-[#FF2D2D] rounded-xl p-4 sm:p-6 space-y-4 shadow-[0_0_20px_rgba(255,45,45,0.15)] animate-in fade-in">
                                                    <h4 className="font-semibold text-base sm:text-lg flex items-center gap-2 mb-2 text-[#FF2D2D]"><i className="fa-solid fa-pen"></i> Edit Artwork</h4>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 sm:gap-4">
                                                        <div>
                                                            <label className="text-xs text-white/50 mb-1 block">Title</label>
                                                            <input type="text" value={editItemData.title} onChange={e => setEditItemData({...editItemData, title: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF2D2D] text-sm sm:text-base" required />
                                                        </div>
                                                        <div>
                                                            <label className="text-xs text-white/50 mb-1 block">Description</label>
                                                            <input type="text" value={editItemData.desc} onChange={e => setEditItemData({...editItemData, desc: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF2D2D] text-sm sm:text-base" required />
                                                        </div>
                                                        <div className="md:col-span-2">
                                                            <label className="text-xs text-white/50 mb-1 block">Image URL</label>
                                                            <input type="url" value={editItemData.img} onChange={e => setEditItemData({...editItemData, img: e.target.value})} className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF2D2D] text-sm sm:text-base" required />
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col sm:flex-row justify-end gap-3 pt-2">
                                                        <button onClick={() => setEditingId(null)} className="px-6 py-2.5 rounded-lg font-medium hover:bg-white/10 text-white/70 transition-colors">Cancel</button>
                                                        <button onClick={() => saveEdit(item.id)} className="bg-[#FF2D2D] text-white px-6 py-2.5 rounded-lg font-medium hover:bg-[#FF2D2D]/90 transition-colors">Save Changes</button>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div key={item.id} className="bg-black border border-white/10 rounded-xl overflow-hidden flex flex-col sm:flex-row sm:items-center gap-4 group pr-4 relative">
                                                    <div className="h-40 sm:h-24 w-full sm:w-32 flex-shrink-0 relative bg-white/5"><img src={item.img} className="w-full h-full object-cover" alt="" /></div>
                                                    <div className="p-4 sm:p-0 flex-1 min-w-0 pr-12 sm:pr-0">
                                                        <p className="font-bold truncate text-lg">{item.title}</p>
                                                        <p className="text-sm text-white/50 truncate">{item.desc}</p>
                                                    </div>
                                                    <div className="absolute top-4 right-4 sm:static sm:flex flex-row sm:flex-row items-center gap-2">
                                                        <div className="flex flex-row sm:flex-col gap-1 bg-white/5 rounded-lg p-1 hidden sm:flex">
                                                            <button onClick={() => movePortfolioItem(index, 'up')} disabled={index === 0} className="p-1.5 text-white/50 hover:text-white disabled:opacity-30 disabled:hover:text-white/50 transition-colors"><i className="fa-solid fa-chevron-up"></i></button>
                                                            <button onClick={() => movePortfolioItem(index, 'down')} disabled={index === portfolio.length - 1} className="p-1.5 text-white/50 hover:text-white disabled:opacity-30 disabled:hover:text-white/50 transition-colors"><i className="fa-solid fa-chevron-down"></i></button>
                                                        </div>
                                                        <button onClick={() => startEdit(item)} className="ml-2 sm:ml-0 bg-blue-500/10 text-blue-500 p-3 rounded-lg hover:bg-blue-500 hover:text-white transition-colors" title="Edit Artwork"><i className="fa-solid fa-pen"></i></button>
                                                        <button onClick={() => setPortfolio(portfolio.filter(p => p.id !== item.id))} className="ml-2 sm:ml-0 bg-red-500/10 text-red-500 p-3 rounded-lg hover:bg-red-500 hover:text-white transition-colors" title="Delete Artwork"><i className="fa-solid fa-trash"></i></button>
                                                    </div>
                                                </div>
                                            )
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'clients' && (
                                <div className="animate-in fade-in">
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-6 sm:mb-8 gap-4">
                                        <h3 className="text-2xl sm:text-3xl font-bold">Manage Clients</h3>
                                        <div className="flex items-center gap-2 text-[#FF2D2D] text-sm bg-[#FF2D2D]/10 px-3 py-1.5 rounded-full font-medium">
                                            {isSyncing ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-arrows-rotate"></i>} 
                                            {isSyncing ? 'Syncing with YouTube...' : 'Live Sync Active'}
                                        </div>
                                    </div>
                                    <form onSubmit={handleAddYouTubeClient} className="bg-black border border-white/10 rounded-xl p-4 sm:p-6 mb-8 sm:mb-10 space-y-4 shadow-xl">
                                        <h4 className="font-semibold text-base sm:text-lg flex items-center gap-2 mb-2"><i className="fa-solid fa-magnifying-glass text-[#FF2D2D]"></i> Auto-Add via YouTube Link</h4>
                                        <div className="flex flex-col sm:flex-row gap-3 sm:gap-4">
                                            <input type="url" placeholder="https://youtube.com/@username" value={ytUrl} onChange={e => setYtUrl(e.target.value)} className="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF2D2D] text-sm sm:text-base" required />
                                            <button type="submit" disabled={isFetchingYt} className="w-full sm:w-auto flex items-center justify-center gap-2 bg-[#FF2D2D] text-white px-6 py-3 rounded-lg font-medium hover:bg-[#FF2D2D]/90 transition-colors disabled:opacity-70">
                                                {isFetchingYt ? <i className="fa-solid fa-spinner fa-spin"></i> : 'Fetch & Add'}
                                            </button>
                                        </div>
                                    </form>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
                                        {clients.map(client => (
                                            <div key={client.id} className="bg-black border border-white/10 rounded-xl p-4 sm:p-5 flex items-center gap-4 relative group">
                                                <img src={client.image} className="w-14 h-14 sm:w-16 sm:h-16 rounded-full object-cover border border-white/10 bg-[#111]" alt="" referrerPolicy="no-referrer" onError={(e) => { e.target.onerror = null; e.target.src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(client.name) + "&background=111&color=fff&size=128"; }} />
                                                <div className="flex-1 min-w-0 pr-8">
                                                    <p className="font-bold truncate" title={client.name}>{client.name}</p>
                                                    <p className="text-sm text-[#FF2D2D] font-medium">{client.subs} Subs</p>
                                                    {client.handle && <p className="text-xs text-white/30 truncate">{client.handle}</p>}
                                                </div>
                                                <button onClick={() => setClients(clients.filter(c => c.id !== client.id))} className="absolute top-1/2 -translate-y-1/2 right-4 text-white/30 hover:text-red-500 transition-colors p-2"><i className="fa-solid fa-trash"></i></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'stats' && (
                                <div className="animate-in fade-in">
                                    <h3 className="text-2xl sm:text-3xl font-bold mb-6 sm:mb-8">Site Settings</h3>
                                    <div className="bg-black border border-white/10 rounded-xl p-4 sm:p-6 shadow-xl max-w-xl">
                                        <label className="block text-sm font-medium text-white/70 mb-2">Total Combined Subscribers Displayed</label>
                                        <div className="flex flex-col sm:flex-row gap-3 sm:gap-4">
                                            <input type="text" value={totalSubs} onChange={e => setTotalSubs(e.target.value)} className="flex-1 bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-[#FF2D2D] font-bold text-lg sm:text-xl text-center sm:text-left" />
                                            <div className="bg-white/10 text-white/50 px-6 py-3 rounded-lg flex items-center justify-center select-none font-bold text-lg sm:text-xl">+ Subscribers</div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const rootNode = document.getElementById('root');
        const root = ReactDOM.createRoot(rootNode);
        root.render(<App />);

    </script>
</body>
</html>
