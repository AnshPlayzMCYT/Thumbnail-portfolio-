<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="oAtom_ - Minecraft Thumbnail Designer">
    
    <title>oAtom_ | Minecraft Thumbnails</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for bulletproof icons (prevents SVG parsing errors on mobile) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for compiling JSX -->
    <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

    <!-- Custom Styles -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
        }
        h1, h2, h3, h4, h5, h6 { font-family: 'Poppins', sans-serif; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #000000; }
        ::-webkit-scrollbar-thumb { background: #FF2D2D; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: #ff4545; }
        
        /* Selection */
        ::selection { background-color: #FF2D2D; color: #ffffff; }
        ::-moz-selection { background-color: #FF2D2D; color: #ffffff; }

        /* Hide scrollbar for nav */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <!-- Fallback UI -->
    <div id="root">
        <div style="display:flex; justify-content:center; align-items:center; height: 100vh; color: white; flex-direction: column; background: black; text-align: center; padding: 20px;">
            <h2 style="margin-bottom: 10px; color: #FF2D2D; font-family: sans-serif;">Loading Portfolio...</h2>
            <p style="color: #888; font-family: sans-serif;">Please wait a moment while the scripts load.</p>
            <div id="debug-log" style="color: #ffaaaa; margin-top: 20px; font-size: 12px; font-family: monospace;"></div>
        </div>
    </div>

    <script>
        window.addEventListener('error', function(e) {
            const log = document.getElementById('debug-log');
            if (log) { log.innerHTML += 'Error: ' + e.message + '<br>'; }
        });
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SAFE STORAGE HELPERS ---
        const safeStorage = {
            get: (key) => {
                try { return localStorage.getItem(key); } 
                catch (e) { return null; }
            },
            set: (key, value) => {
                try { localStorage.setItem(key, value); } 
                catch (e) { console.warn("Local storage blocked."); }
            }
        };

        // --- UTILITY FUNCTIONS ---
        const extractHandle = (url) => {
            const match = url.match(/@([a-zA-Z0-9_.-]+)/);
            return match ? "@" + match[1] : null;
        };

        const formatSubs = (countStr) => {
            const count = parseInt(countStr, 10);
            if (isNaN(count)) return countStr;
            if (count >= 1000000) return (count / 1000000).toFixed(2).replace(/\.00$/, '') + 'M';
            if (count >= 1000) return (count / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
            return count.toString();
        };

        const fetchYouTubeData = async (handle) => {
            try {
                const cleanHandle = handle.replace('@', '');
                const url = "https://yt.lemnoslife.com/channels?handle=@" + cleanHandle + "&part=snippet,statistics";
                const res = await fetch(url);
                const data = await res.json();
                
                if (data && data.items && data.items.length > 0) {
                    const channel = data.items[0];
                    return {
                        name: channel.snippet.title,
                        subs: formatSubs(channel.statistics.subscriberCount),
                        image: "https://unavatar.io/youtube/" + cleanHandle, 
                        handle: "@" + cleanHandle
                    };
                }
                return null;
            } catch (error) {
                console.error("Failed to fetch YT data:", error);
                return null;
            }
        };

        // --- DEFAULT DATA ---
        const defaultClients = [
            { id: 1, name: "LivingLegend", subs: "94.2K", image: "https://unavatar.io/youtube/LivingLegendOP", handle: "@LivingLegendOP" },
            { id: 2, name: "ItzNectar", subs: "21.5K", image: "https://unavatar.io/youtube/itznectar", handle: "@itznectar" },
            { id: 3, name: "MominGaming", subs: "13.8K", image: "https://unavatar.io/youtube/Momingaming50", handle: "@Momingaming50" }
        ];

        const defaultPortfolio = [
            { id: 1, title: "I Became Minecraft's Serial Killer", desc: "Built for high CTR and shock value", img: "https://customer-assets.emergentagent.com/job_e2a39607-2a2e-435e-accd-e6cb36a1d21f/artifacts/pcjm2n81_Final%20bos%20ka%20bhi%20final%20boss.png" },
            { id: 2, title: "Why My Friends Betrayed Me (Minecraft SMP)", desc: "Emotion-driven design for more clicks", img: "https://customer-assets.emergentagent.com/job_e2a39607-2a2e-435e-accd-e6cb36a1d21f/artifacts/mquvrng2_edit1.png" },
            { id: 3, title: "Minecraft PvP Montage (HT3)", desc: "Clean action-focused thumbnail", img: "https://customer-assets.emergentagent.com/job_e2a39607-2a2e-435e-accd-e6cb36a1d21f/artifacts/zxf6ha9a_thumb%202.jpg" },
            { id: 4, title: "Minecraft... But It's Terrifying", desc: "Horror-style curiosity design", img: "https://customer-assets.emergentagent.com/job_thumbnail-atom/artifacts/2apz66ww_ahhh%20kitna%20kaam%20kru%20%F0%9F%98%AD.png" },
            { id: 5, title: "I Joined Minecraft's Greatest Supervillains", desc: "High contrast storytelling", img: "https://customer-assets.emergentagent.com/job_e2a39607-2a2e-435e-accd-e6cb36a1d21f/artifacts/qj687wto_thumb4.jpg" },
            { id: 6, title: "Why I Assassinated Everyone in This SMP", desc: "Drama-focused clickbait design", img: "https://customer-assets.emergentagent.com/job_e2a39607-2a2e-435e-accd-e6cb36a1d21f/artifacts/8iu1odtz_thumb3.png" },
            { id: 7, title: "I Became Minecraft's Greatest Spy", desc: "Mystery-based thumbnail", img: "https://customer-assets.emergentagent.com/job_thumbnail-atom/artifacts/f9bydvnq_1000051194.png" }
        ];

        // --- MAIN APP ---
        function App() {
            const [view, setView] = useState('home'); 
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);

            const [portfolio, setPortfolio] = useState(() => {
                const saved = safeStorage.get('atom_portfolio');
                return saved ? JSON.parse(saved) : defaultPortfolio;
            });
            const [clients, setClients] = useState(() => {
                const saved = safeStorage.get('atom_clients');
                return saved ? JSON.parse(saved) : defaultClients;
            });
            const [totalSubs, setTotalSubs] = useState(() => {
                const saved = safeStorage.get('atom_totalsubs');
                return saved ? saved : "130K";
            });

            useEffect(() => { safeStorage.set('atom_portfolio', JSON.stringify(portfolio)); }, [portfolio]);
            useEffect(() => { safeStorage.set('atom_clients', JSON.stringify(clients)); }, [clients]);
            useEffect(() => { safeStorage.set('atom_totalsubs', totalSubs); }, [totalSubs]);

            useEffect(() => {
                const syncClients = async () => {
                    setIsSyncing(true);
                    const updatedClients = await Promise.all(
                        clients.map(async (client) => {
                            if (client.handle) {
                                const liveData = await fetchYouTubeData(client.handle);
                                if (liveData) return { ...client, ...liveData };
                            }
                            return client;
                        })
                    );
                    setClients(updatedClients);
                    setIsSyncing(false);
                };
                syncClients();
            }, []); 

            return (
                <div className="min-h-screen bg-black text-white font-sans selection:bg-[#FF2D2D] selection:text-white overflow-x-hidden relative">
                    {view !== 'admin' && <Navbar setView={setView} currentView={view} />}
                    {view === 'home' && <HomePage portfolio={portfolio} clients={clients} totalSubs={totalSubs} setView={setView} />}
                    {view === 'artworks' && <AllArtworksPage portfolio={portfolio} setView={setView} />}
                    {view === 'admin' && !isAuthenticated && <AdminLogin onLogin={() => setIsAuthenticated(true)} setView={setView} />}
                    {view === 'admin' && isAuthenticated && (
                        <AdminDashboard 
                            portfolio={portfolio} setPortfolio={setPortfolio}
                            clients={clients} setClients={setClients}
                            totalSubs={totalSubs} setTotalSubs={setTotalSubs}
                            setView={setView} setIsAuthenticated={setIsAuthenticated}
                            isSyncing={isSyncing}
                        />
                    )}
                </div>
            );
        }

        function Navbar({ setView, currentView }) {
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            const handleNav = (targetView, anchor) => {
                setIsMobileMenuOpen(false);
                if (currentView !== 'home' && targetView === 'home') {
                    setView('home');
                    setTimeout(() => { 
                        if (anchor) document.getElementById(anchor)?.scrollIntoView({ behavior: 'smooth' }); 
                    }, 100);
                } else {
                    if (anchor) {
                        document.getElementById(anchor)?.scrollIntoView({ behavior: 'smooth' });
                    } else { 
                        setView(targetView); 
                        window.scrollTo(0, 0); 
                    }
                }
            };

            return (
                <React.Fragment>
                    <header className="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/10">
                        <div className="container mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                            <h1 onClick={() => handleNav('home')} className="text-2xl font-bold tracking-tight cursor-pointer hover:text-[#FF2D2D] transition-colors">
                                oAtom_
                            </h1>
                            <button onClick={() => setIsMobileMenuOpen(true)} className="text-white hover:text-[#FF2D2D] transition-colors cursor-pointer p-2 -mr-2 text-2xl">
                                <i className="fa-solid fa-bars"></i>
                            </button>
                        </div>
                    </header>

                    <div className={`fixed inset-0 z-[60] bg-black/95 flex flex-col items-center justify-center space-y-8 text-2xl font-bold backdrop-blur-lg transition-all duration-300 ${isMobileMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible pointer-events-none'}`}>
                        <button onClick={() => setIsMobileMenuOpen(false)} className="absolute top-4 right-4 sm:top-6 sm:right-6 text-white hover:text-[#FF2D2D] p-4 text-3xl">
                            <i className="fa-solid fa-xmark"></i>
                        </button>
                        <button onClick={() => handleNav('home', 'portfolio')} className="hover:text-[#FF2D2D] transition-colors">Portfolio</button>
                        <button onClick={() => handleNav('artworks')} className="hover:text-[#FF2D2D] transition-colors">All Artworks</button>
                        <button onClick={() => handleNav('home', 'contact')} className="hover:text-[#FF2D2D] transition-colors">Contact</button>
                    </div>
                </React.Fragment>
            );
        }

        function HomePage({ portfolio, clients, totalSubs, setView }) {
            const featuredPortfolio = portfolio.slice(0, 4);

            return (
                <div className="animate-in fade-in duration-500">
                    <section className="min-h-screen flex items-center justify-center px-4 sm:px-6 pt-20">
                        <div className="container mx-auto max-w-5xl text-center">
                            <div className="space-y-6 sm:space-y-8 duration-700">
                                <h2 className="text-4xl sm:text-5xl md:text-7xl font-bold leading-tight">
                                    I Make Minecraft Thumbnails That Get <br className="hidden md:block" />
                                    <span className="text-[#FF2D2D] relative inline-block">
                                        Clicks
                                        <div className="absolute -inset-2 bg-[#FF2D2D]/20 blur-xl -z-10 rounded-full"></div>
                                    </span>
                                </h2>
                                <p className="text-xl sm:text-2xl md:text-3xl text-white/90 font-medium">More views. More clicks. More growth.</p>
                                <p className="text-base sm:text-lg md:text-xl text-white/70 max-w-3xl mx-auto leading-relaxed">
                                    I&apos;m Atom — a Minecraft thumbnail designer focused on high-CTR visuals that stop scrolling and drive views.
                                </p>
                                <div className="pt-4 sm:pt-6">
                                    <p className="text-lg sm:text-xl md:text-2xl font-semibold text-white/90 mb-6 flex flex-col sm:block gap-1">
                                        <span>Pricing: <span className="text-[#FF2D2D]">$3 – $53</span></span> 
                                        <span className="text-white/50 text-sm sm:text-base font-normal sm:ml-2">(DM for custom packages)</span>
                                    </p>
                                    <button onClick={() => document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' })} className="inline-flex items-center justify-center gap-3 shadow h-12 md:h-14 rounded-md bg-[#FF2D2D] hover:bg-[#FF2D2D]/90 text-white px-6 sm:px-8 py-4 sm:py-6 text-base sm:text-lg font-bold group transition-all hover:scale-105 hover:shadow-[0_0_30px_rgba(255,45,45,0.4)]">
                                        Let&apos;s Work Together
                                        <i className="fa-solid fa-arrow-up-right-from-square group-hover:translate-x-1 transition-transform"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="py-16 sm:py-20 bg-[#0a0a0a] border-y border-white/5 relative overflow-hidden">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] sm:w-[600px] h-[300px] bg-[#FF2D2D]/5 blur-[100px] rounded-full pointer-events-none"></div>
                        <div className="container mx-auto px-4 sm:px-6 relative z-10 text-center">
                            <h3 className="text-xl sm:text-2xl md:text-3xl font-bold mb-2 text-white/80">Trusted By Creators With</h3>
                            <p className="text-5xl sm:text-6xl md:text-7xl font-extrabold text-[#FF2D2D] mb-10 sm:mb-12 drop-shadow-[0_0_30px_rgba(255,45,45,0.3)] tracking-tight">
                                {totalSubs}+ <span className="text-2xl sm:text-3xl md:text-5xl text-white">Subscribers</span>
                            </p>
                            
                            <div className="flex flex-wrap justify-center gap-6 sm:gap-10 md:gap-16 items-center">
                                {clients.map(client => (
                                    <div key={client.id} className="flex flex-col items-center gap-3 sm:gap-4 group">
                                        <div className="w-16 h-16 sm:w-20 sm:h-20 md:w-24 md:h-24 rounded-full overflow-hidden border-2 border-white/10 group-hover:border-[#FF2D2D]/50 transition-colors duration-300 shadow-lg bg-[#111]">
                                            <img src={client.image} alt={client.name} referrerPolicy="no-referrer" onError={(e) => { e.target.onerror = null; e.target.src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(client.name) + "&background=111&color=fff&size=128"; }} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="text-center">
                                            <p className="font-bold text-base sm:text-lg md:text-xl text-white group-hover:text-[#FF2D2D] transition-colors">{client.name}</p>
                                            <p className="text-xs sm:text-sm md:text-base text-[#FF2D2D] font-medium">{client.subs} Subs</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <p className="mt-10 sm:mt-12 text-white/40 italic text-base sm:text-lg font-medium">...and many more</p>
                        </div>
                    </section>

                    <section className="py-16 sm:py-24 px-4 sm:px-6" id="portfolio">
                        <div className="container mx-auto max-w-6xl">
                            <div className="text-center mb-12 sm:mb-16">
                                <h3 className="text-3xl sm:text-4xl md:text-5xl font-bold mb-4">Thumbnails That Get Clicks</h3>
                                <div className="w-16 sm:w-24 h-1 bg-[#FF2D2D] mx-auto"></div>
                            </div>
                            
                            <div className="space-y-16 sm:space-y-24">
                                {featuredPortfolio.map((item, index) => {
                                    const layoutClass = index % 2 !== 0 ? "md:flex-row-reverse" : "md:flex-row";
                                    return (
                                        <div key={item.id} className={"flex flex-col gap-6 sm:gap-8 items-center group " + layoutClass}>
                                            <div className="w-full md:w-1/2 overflow-hidden rounded-xl border border-white/5 bg-white/5">
                                                <img alt={item.title} src={item.img} className="w-full h-auto rounded-xl transition-all dur
